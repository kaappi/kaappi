name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        optimize: [ReleaseSafe]
        include:
          - os: ubuntu-latest
            optimize: Debug
          - os: ubuntu-latest
            optimize: ReleaseFast

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ matrix.optimize }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-${{ matrix.os }}-${{ matrix.optimize }}-

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Unit tests (leak detection via std.testing.allocator)
        run: zig build test -Doptimize=${{ matrix.optimize }}

      - name: Scheme suites
        run: bash tests/scheme/run-all.sh

      - name: Sandbox escape tests
        if: matrix.optimize == 'ReleaseSafe'
        run: bash tests/scheme/sandbox/sandbox-escape.sh

      - name: Robustness tests
        if: matrix.optimize == 'ReleaseSafe'
        run: bash tests/scheme/robustness/robustness.sh

      - name: thottam integration test
        if: matrix.optimize == 'ReleaseSafe'
        run: |
          export KAAPPI_HOME=$(mktemp -d)
          zig-out/bin/thottam list
          zig-out/bin/thottam install kaappi-json
          zig-out/bin/thottam list | grep kaappi-json
          zig-out/bin/thottam verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' | zig-out/bin/kaappi --lib-path "$KAAPPI_HOME/lib"
          zig-out/bin/thottam remove kaappi-json
          ! zig-out/bin/thottam list | grep kaappi-json
          rm -rf "$KAAPPI_HOME"

  riscv64-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-riscv64-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-riscv64-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build (cross-compile for riscv64)
        run: zig build -Dtarget=riscv64-linux

      - name: Unit tests (riscv64 via QEMU)
        run: zig build test -Dtarget=riscv64-linux

      - name: R7RS test suite (riscv64 via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install kcov
        run: sudo apt-get update && sudo apt-get install -y kcov

      - name: Unit test coverage
        run: zig build coverage
        continue-on-error: true

      - name: R7RS suite coverage
        run: zig build coverage-scheme -- tests/scheme/r7rs/r7rs-tests.scm
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Run benchmarks
        run: bash benchmarks/run-benchmarks.sh --json > benchmark-results.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
