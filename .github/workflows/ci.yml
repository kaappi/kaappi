name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src/

      - name: Check bare TypeError regression
        run: |
          count=$(grep -r 'return PrimitiveError\.TypeError' src/primitives*.zig | grep -v 'bare-ok' | wc -l | tr -d ' ')
          echo "Unannotated bare TypeErrors: $count (baseline: 91)"
          if [ "$count" -gt 91 ]; then
            echo "::error::New bare PrimitiveError.TypeError without 'bare-ok' annotation."
            echo "Use primitives.typeError(proc, expected, got) for type checks."
            echo "Only add '// bare-ok: <reason>' for infrastructure guards."
            grep -rn 'return PrimitiveError\.TypeError' src/primitives*.zig | grep -v 'bare-ok'
            exit 1
          fi

  test:
    needs: format
    runs-on: ${{ matrix.os }}
    # macOS runners are ~1.5x slower than the Linux ones: unit tests (~6 min)
    # plus the Scheme suites (~11 min) alone run ~17 min and drift over the
    # default 20-min cap, so the job is cancelled mid-run (a pre-existing flake
    # seen on main). Give macOS 30 min, matching the Debug and riscv64 jobs.
    timeout-minutes: ${{ matrix.timeout || (matrix.os == 'macos-latest' && 30 || 20) }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        optimize: [ReleaseSafe]
        include:
          - os: ubuntu-latest
            optimize: Debug
            timeout: 30
          - os: ubuntu-latest
            optimize: ReleaseFast

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: ${{ matrix.optimize }}

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Unit tests (leak detection via std.testing.allocator)
        run: zig build test -Doptimize=${{ matrix.optimize }}

      - name: Scheme suites
        run: bash tests/scheme/run-all.sh
        env:
          KAAPPI_TEST_SKIP: ${{ matrix.optimize == 'Debug' && 'callcc-bench.scm r7rs-tail-procedures-gaps.scm r7rs-thin-forms-gaps.scm' || '' }}

      - name: Sandbox escape tests
        run: bash tests/scheme/sandbox/sandbox-escape.sh

      - name: Parallel pool sandbox degradation tests
        run: bash tests/scheme/sandbox/parallel-degrades.sh

      - name: Robustness tests
        run: bash tests/scheme/robustness/robustness.sh

      - name: E2E tests (LLVM native backend)
        if: matrix.optimize == 'ReleaseSafe'
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi-bdd.git ../kaappi-bdd
          bash tests/e2e/run-e2e.sh

      - name: thottam integration test
        if: matrix.optimize == 'ReleaseSafe'
        run: |
          export KAAPPI_HOME=$(mktemp -d)
          zig-out/bin/thottam list
          zig-out/bin/thottam install kaappi-json
          zig-out/bin/thottam list | grep kaappi-json
          zig-out/bin/thottam verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' | zig-out/bin/kaappi --lib-path "$KAAPPI_HOME/lib"
          zig-out/bin/thottam remove kaappi-json
          ! zig-out/bin/thottam list | grep kaappi-json
          rm -rf "$KAAPPI_HOME"

  riscv64-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: riscv64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: riscv64

      - name: Build (cross-compile for riscv64)
        run: zig build -Dtarget=riscv64-linux

      - name: Unit tests (riscv64 via QEMU)
        run: zig build test -Dtarget=riscv64-linux

      - name: R7RS test suite (riscv64 via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm

  # Cross-compile the Windows aarch64 binaries and the unit-test binary
  # from Linux. Compile-only by design: this guards the cross-compilation
  # path release.yml ships with, independent of the Windows runner image.
  # Execution is covered by windows-arm-test below.
  windows-cross:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: windows-cross

      - name: Build (cross-compile for aarch64-windows)
        run: zig build -Dtarget=aarch64-windows

      - name: Compile unit tests (aarch64-windows)
        # The host can't execute the foreign test binaries; the build's
        # Run steps set skip_foreign_checks, so this compiles everything
        # and skips execution — a plain compile gate with normal error
        # propagation.
        run: |
          zig build test -Dtarget=aarch64-windows
          ls .zig-cache/o/*/unit-tests.exe

      - name: Stage binaries for windows-arm-test
        # ls -t picks the exe this run compiled — the restored Zig cache
        # can hold stale unit-tests.exe from earlier runs.
        run: |
          mkdir -p win-stage
          cp zig-out/bin/kaappi.exe zig-out/bin/thottam.exe zig-out/bin/kaappi-lsp.exe win-stage/
          cp "$(ls -t .zig-cache/o/*/unit-tests.exe | head -1)" win-stage/
          cp "$(ls -t .zig-cache/o/*/thottam-tests.exe | head -1)" win-stage/

      - name: Upload binaries for windows-arm-test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-aarch64-binaries
          path: win-stage/
          retention-days: 3

  # Execute the suite on real Windows ARM64 via GitHub's hosted
  # windows-11-arm runners (free for public repos): the unit suite, the
  # thottam suite + install/remove integration (#1609), the R7RS suite,
  # and the .scm suites verified on the port's reference VM
  # (docs/dev/windows.md). The binaries come cross-compiled from
  # windows-cross — Zig 0.16.0 cannot compile natively on Windows ARM64
  # (zig build/build-exe access-violate on any project, #1613) — so this
  # job installs no toolchain and only executes. The shell-based suites
  # (#1612) and the FFI suite (#1611) are not runnable on Windows yet.
  windows-arm-test:
    needs: windows-cross
    runs-on: windows-11-arm
    timeout-minutes: 40
    steps:
      # The Windows runner images set core.autocrlf=true; the Scheme
      # suites compare exact output, so check out files as committed.
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-aarch64-binaries
          path: bin

      - name: Unwrap archived artifact
        # upload-artifact v7 archives by default and download-artifact v8
        # hands the wrapper zip back as a file (same dance as fuzz.yml's
        # report job). Windows ships bsdtar, which extracts zip.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for z in bin/*.zip; do tar -xf "$z" -C bin && rm -f "$z"; done
          ls -l bin

      - name: Create tmp directories
        # Tests write scratch files under /tmp/..., which kaappi.exe
        # resolves to \tmp on the current drive (docs/dev/windows.md).
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null
          $drive = (Get-Location).Path.Substring(0, 2)
          New-Item -ItemType Directory -Force -Path "$drive\tmp" | Out-Null

      - name: Unit tests
        shell: bash
        run: bin/unit-tests.exe

      - name: thottam unit tests
        shell: bash
        run: bin/thottam-tests.exe

      - name: thottam integration test
        # Mirrors the POSIX test job's step: a real install of the
        # pure-Scheme kaappi-json (Git for Windows is preinstalled on the
        # runner), imported through the installed lib dir, then removed —
        # which deletes a real git clone, whose read-only pack files are
        # the Windows-specific removal hazard (#1609). KAAPPI_HOME is a
        # C:/-style path (pwd -W): thottam hands paths straight to git.exe
        # and the CRT, which never see git-bash's /d/... spellings.
        shell: bash
        run: |
          export KAAPPI_HOME="$(pwd -W)/thottam-home"
          bin/thottam.exe list
          bin/thottam.exe install kaappi-json
          bin/thottam.exe update kaappi-json
          bin/thottam.exe list | grep kaappi-json
          bin/thottam.exe verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' > use-json.scm
          bin/kaappi.exe --lib-path "$KAAPPI_HOME/lib" use-json.scm
          bin/thottam.exe remove kaappi-json
          ! bin/thottam.exe list | grep kaappi-json
          rm -f use-json.scm

      - name: R7RS test suite
        shell: bash
        run: bin/kaappi.exe tests/scheme/r7rs/r7rs-tests.scm

      - name: Scheme suites (VM-verified subset)
        shell: bash
        run: |
          fail=0
          for dir in smoke compliance continuations hygiene srfi audit; do
            for f in tests/scheme/$dir/*.scm; do
              if bin/kaappi.exe "$f" > out.log 2>&1; then
                echo "  PASS  $f"
              else
                echo "  FAIL  $f"
                cat out.log
                fail=1
              fi
            done
          done
          rm -f out.log
          exit $fail

  wasm:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: wasm

      - name: Build WASM
        run: zig build wasm

      - name: Install wasmtime
        run: |
          WASMTIME_VERSION=v46.0.1
          curl -sSfL "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" | tar xJ
          echo "$(pwd)/wasmtime-${WASMTIME_VERSION}-x86_64-linux" >> "$GITHUB_PATH"

      - name: Smoke test
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/smoke.scm

      - name: Timer test (reactor poll_oneoff backend)
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/timers.scm

      - name: Parallel pool test (fiber-degraded, KEP-0002 Phase 5)
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/parallel.scm

  coverage:
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Install kcov
        run: sudo apt-get update && sudo apt-get install -y kcov

      - name: Unit test coverage
        run: zig build coverage
        continue-on-error: true

      - name: R7RS suite coverage
        run: zig build coverage-scheme -- tests/scheme/r7rs/r7rs-tests.scm
        continue-on-error: true

      - name: Extended coverage (disassembler, etc.)
        run: |
          for f in tests/scheme/coverage/*-coverage.scm; do
            zig build coverage-scheme -- "$f" || true
          done
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 90

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          directory: coverage/
          fail_ci_if_error: false

  benchmark:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      # github-action-benchmark's auto-push authenticates via its
      # github-token input (token-in-URL remote), not persisted
      # checkout credentials, so these can stay disabled.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Run benchmarks
        run: bash benchmarks/run-benchmarks.sh --json > benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: 'dev/bench'
          max-items-in-chart: 100
