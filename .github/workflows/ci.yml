name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: R7RS test suite
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm
