name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        optimize: [ReleaseSafe]
        include:
          - os: ubuntu-latest
            optimize: Debug
          - os: ubuntu-latest
            optimize: ReleaseFast

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ matrix.optimize }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-${{ matrix.os }}-${{ matrix.optimize }}-

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Unit tests
        run: zig build test -Doptimize=${{ matrix.optimize }}

      - name: Scheme suites
        run: bash tests/scheme/run-all.sh

  riscv64-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-riscv64-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-riscv64-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build (cross-compile for riscv64)
        run: zig build -Dtarget=riscv64-linux

      - name: Unit tests (riscv64 via QEMU)
        run: zig build test -Dtarget=riscv64-linux

      - name: R7RS test suite (riscv64 via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm
