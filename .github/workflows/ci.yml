name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src/

      - name: Check bare TypeError regression
        run: |
          count=$(grep -r 'return PrimitiveError\.TypeError' src/primitives*.zig | grep -v 'bare-ok' | wc -l | tr -d ' ')
          echo "Unannotated bare TypeErrors: $count (baseline: 91)"
          if [ "$count" -gt 91 ]; then
            echo "::error::New bare PrimitiveError.TypeError without 'bare-ok' annotation."
            echo "Use primitives.typeError(proc, expected, got) for type checks."
            echo "Only add '// bare-ok: <reason>' for infrastructure guards."
            grep -rn 'return PrimitiveError\.TypeError' src/primitives*.zig | grep -v 'bare-ok'
            exit 1
          fi

  test:
    needs: format
    runs-on: ${{ matrix.os }}
    # Successful runs of every leg sit at 15-23 min (Linux Release legs
    # 15-18, macOS 18-23), so a 20-min cap leaves only minutes of headroom
    # and ordinary runner variance cancels healthy runs mid-suite — it hit
    # macOS ReleaseSafe repeatedly on main and then ubuntu ReleaseFast on
    # PR #1635. 30 min is the hang-bound the Debug and riscv64 jobs
    # already use; the timeout exists to catch hangs, not to race the
    # suite.
    timeout-minutes: ${{ matrix.timeout || 30 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        optimize: [ReleaseSafe]
        include:
          - os: ubuntu-latest
            optimize: Debug
            timeout: 30
          - os: ubuntu-latest
            optimize: ReleaseFast

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: ${{ matrix.optimize }}

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      # Kaappi ships only final SRFIs. Fail if the binary reports a SRFI whose
      # status in the canonical registry is draft/withdrawn. Runs once (needs a
      # binary; the enumeration comes from `kaappi features --json`). Exit 77 =
      # SKIP (registry unreachable) so a network blip never reds the leg.
      - name: SRFI final-status guard
        if: matrix.os == 'ubuntu-latest' && matrix.optimize == 'ReleaseSafe'
        run: |
          set +e
          bash tools/check-srfi-status.sh zig-out/bin/kaappi
          code=$?
          set -e
          if [ "$code" -eq 77 ]; then
            echo "::warning::SRFI final-status check skipped (registry unreachable)"
            exit 0
          fi
          exit "$code"

      - name: Unit tests (leak detection via std.testing.allocator)
        run: zig build test -Doptimize=${{ matrix.optimize }}

      - name: Scheme suites
        run: bash tests/scheme/run-all.sh
        env:
          KAAPPI_TEST_SKIP: ${{ matrix.optimize == 'Debug' && 'callcc-bench.scm r7rs-tail-procedures-gaps.scm r7rs-thin-forms-gaps.scm' || '' }}

      - name: Sandbox escape tests
        run: bash tests/scheme/sandbox/sandbox-escape.sh

      - name: Parallel pool sandbox degradation tests
        run: bash tests/scheme/sandbox/parallel-degrades.sh

      - name: Robustness tests
        run: bash tests/scheme/robustness/robustness.sh

      - name: E2E tests (LLVM native backend)
        if: matrix.optimize == 'ReleaseSafe'
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi-bdd.git ../kaappi-bdd
          bash tests/e2e/run-e2e.sh

      - name: thottam integration test
        if: matrix.optimize == 'ReleaseSafe'
        run: |
          export KAAPPI_HOME=$(mktemp -d)
          zig-out/bin/thottam list
          zig-out/bin/thottam install kaappi-json
          zig-out/bin/thottam list | grep kaappi-json
          zig-out/bin/thottam verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' | zig-out/bin/kaappi --lib-path "$KAAPPI_HOME/lib"
          zig-out/bin/thottam remove kaappi-json
          ! zig-out/bin/thottam list | grep kaappi-json
          rm -rf "$KAAPPI_HOME"

  riscv64-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: riscv64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: riscv64

      - name: Build (cross-compile for riscv64)
        run: zig build -Dtarget=riscv64-linux

      - name: Unit tests (riscv64 via QEMU)
        run: zig build test -Dtarget=riscv64-linux

      - name: R7RS test suite (riscv64 via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm

  # s390x: interpreter tier like riscv64 (#1654), and the only big-endian
  # target in the matrix — a permanent canary for byte-order bugs in the
  # `.sbc` codec and any future serialization. Also validated on a
  # real-kernel Alpine s390x VM (unit + thottam + R7RS + full Scheme
  # suites; user VA stays below 2^42, inside the 48-bit NaN-box payload).
  s390x-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: s390x

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: s390x

      - name: Build (cross-compile for s390x)
        run: zig build -Dtarget=s390x-linux

      - name: Unit tests (s390x via QEMU)
        run: zig build test -Dtarget=s390x-linux

      - name: R7RS test suite (s390x via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm

  # ppc64le: interpreter tier like riscv64 (#1654). Also validated on a
  # real-kernel Alpine ppc64le VM (unit + thottam + R7RS + full Scheme
  # suites; 128 TB = 2^47 default map window fits the NaN-box payload).
  ppc64le-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: ppc64le

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: ppc64le

      - name: Build (cross-compile for ppc64le)
        run: zig build -Dtarget=powerpc64le-linux

      - name: Unit tests (ppc64le via QEMU)
        run: zig build test -Dtarget=powerpc64le-linux

      - name: R7RS test suite (ppc64le via QEMU)
        run: zig-out/bin/kaappi tests/scheme/r7rs/r7rs-tests.scm

  # FreeBSD: cross-compile the binaries and test executables from Linux
  # (guarding the cross-compilation path release.yml ships with), then
  # boot a FreeBSD VM via KVM on the same runner — GitHub hosts no
  # FreeBSD runners — and execute the unit suite, the thottam suite, and
  # the full Scheme suite inside it. Same build-anywhere/execute-on-target
  # idea as windows-cross → windows-arm-test, collapsed into one job
  # because the VM shares the workspace (no artifact handoff needed).
  # The VM tracks the oldest supported release line (Zig's bundled
  # FreeBSD libc floor is 14.0); the port's reference machine runs
  # 15.1 aarch64 (docs/dev/freebsd.md).
  freebsd-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: freebsd

      - name: Build (cross-compile for x86_64-freebsd)
        # Includes the native runtime archive: inside the VM, the
        # compile-suite scripts that need no zig themselves (e.g.
        # native-rebind-stale-call-822.sh) link `kaappi compile` output
        # against zig-out/lib/libkaappi_rt.a with the base system cc.
        run: |
          zig build -Dtarget=x86_64-freebsd
          zig build lib -Dtarget=x86_64-freebsd

      - name: Compile unit tests (x86_64-freebsd)
        # skip_foreign_checks makes this compile-and-skip on the Linux
        # host; the binaries are executed inside the VM below. ls -t picks
        # the binaries this run compiled — the restored Zig cache can hold
        # stale ones from earlier runs.
        run: |
          zig build test -Dtarget=x86_64-freebsd
          cp "$(ls -t .zig-cache/o/*/unit-tests | head -1)" ./unit-tests-freebsd
          cp "$(ls -t .zig-cache/o/*/thottam-tests | head -1)" ./thottam-tests-freebsd

      - name: Trim workspace for VM sync
        # The VM step rsyncs the whole workspace into the guest; the Zig
        # cache is by far its largest tree and nothing in the VM needs it.
        run: rm -rf .zig-cache

      - name: Run test suites (FreeBSD VM)
        uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1
        with:
          release: "14.3"
          usesh: true
          sync: rsync
          copyback: false
          # bash: run-all.sh; python3 + git: the errors/ and test-runner/
          # suites validate JSON output and build throwaway git repos.
          prepare: pkg install -y bash python3 git
          run: |
            set -e
            ./unit-tests-freebsd
            ./thottam-tests-freebsd
            cc -shared -fPIC tests/scheme/ffi/fixtures/u64test.c -o tests/scheme/ffi/fixtures/libu64test.so
            bash tests/scheme/run-all.sh

  # OpenBSD: cross-compile the x86_64 binaries + test executables on Linux,
  # mark them PT_OPENBSD_NOBTCFI (Zig 0.16 emits no BTI landing pads, which
  # OpenBSD's BTCFI enforcement requires — docs/dev/openbsd.md), then execute
  # inside a KVM OpenBSD VM (GitHub hosts no OpenBSD runners). The VM tracks
  # 7.9 to match the aarch64 reference machine; OpenBSD breaks ABI between
  # releases, so the Zig-targeted release and the VM release must agree.
  openbsd-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: openbsd

      - name: Build (cross-compile for x86_64-openbsd)
        # zig build marks the three installed binaries PT_OPENBSD_NOBTCFI via
        # the host patcher (build.zig installExe). The runtime archive lets the
        # VM's compile-suite scripts link `kaappi compile` output with base cc.
        run: |
          zig build -Dtarget=x86_64-openbsd
          zig build lib -Dtarget=x86_64-openbsd

      - name: Compile and mark unit tests (x86_64-openbsd)
        # skip_foreign_checks makes this compile-and-skip on the Linux host;
        # the binaries execute inside the VM below. ls -t picks the binaries
        # this run compiled. Test executables are not installed artifacts, so
        # the NOBTCFI marker is applied explicitly with the same host tool.
        run: |
          zig build test -Dtarget=x86_64-openbsd
          cp "$(ls -t .zig-cache/o/*/unit-tests | head -1)" ./unit-tests-openbsd
          cp "$(ls -t .zig-cache/o/*/thottam-tests | head -1)" ./thottam-tests-openbsd
          # -lc: the tool uses libc I/O (std.c.pread/pwrite), which `zig run`
          # links implicitly on macOS but not on this Linux host.
          zig run tools/openbsd_nobtcfi.zig -lc -- ./unit-tests-openbsd ./thottam-tests-openbsd

      - name: Trim workspace for VM sync
        run: rm -rf .zig-cache

      - name: Run test suites (OpenBSD VM)
        uses: vmactions/openbsd-vm@c941015845c0f0c429676840963dc63b226d4f69 # v1
        with:
          release: "7.9"
          usesh: true
          sync: rsync
          copyback: false
          # bash: run-all.sh; python3 + git: the errors/ and test-runner/
          # suites validate JSON output and build throwaway git repos.
          prepare: pkg_add -I bash python%3 git
          run: |
            set -e
            # OpenBSD's default login class caps the main-thread stack at 4 MiB
            # and the data segment at 1.5 GiB. The test runner recurses on the
            # main thread, and std.testing's DebugAllocator never reuses freed
            # address space, so raise both to the hard limits before running the
            # unit-test binary (docs/dev/openbsd.md).
            ulimit -s $(ulimit -Hs)
            ulimit -d $(ulimit -Hd)
            ./unit-tests-openbsd
            ./thottam-tests-openbsd
            cc -shared -fPIC tests/scheme/ffi/fixtures/u64test.c -o tests/scheme/ffi/fixtures/libu64test.so
            bash tests/scheme/run-all.sh

  netbsd-test:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: netbsd

      - name: Build (cross-compile for x86_64-netbsd)
        # The runtime archive lets the VM's compile-suite scripts link
        # `kaappi compile` output with pkgsrc clang (NetBSD's base cc is GCC,
        # which cannot consume LLVM IR — docs/dev/netbsd.md).
        run: |
          zig build -Dtarget=x86_64-netbsd
          zig build lib -Dtarget=x86_64-netbsd

      - name: Compile unit tests (x86_64-netbsd)
        # skip_foreign_checks makes this compile-and-skip on the Linux host;
        # the binaries execute inside the VM below. ls -t picks the binaries
        # this run compiled.
        run: |
          zig build test -Dtarget=x86_64-netbsd
          cp "$(ls -t .zig-cache/o/*/unit-tests | head -1)" ./unit-tests-netbsd
          cp "$(ls -t .zig-cache/o/*/thottam-tests | head -1)" ./thottam-tests-netbsd

      - name: Trim workspace for VM sync
        run: rm -rf .zig-cache

      - name: Run test suites (NetBSD VM)
        uses: vmactions/netbsd-vm@fac0a63f3e5244c600cb9ca532d27ee774ecdb4b # v1
        with:
          release: "10.1"
          usesh: true
          sync: rsync
          copyback: false
          # 6 GiB: std.testing's DebugAllocator commits ~4 GiB cumulative
          # over the unit suite (poisoned freed pages are never unmapped)
          # and the vmactions image has no swap configured — the 4 GiB
          # reference machine needed a swapfile for the same reason
          # (docs/dev/netbsd.md).
          mem: 6144
          # bash: run-all.sh; python3 + git: the errors/ and test-runner/
          # suites validate JSON output and build throwaway git repos;
          # clang: the compile/ suite needs an LLVM-capable driver (base cc
          # is GCC). Retried: cdn.netbsd.org intermittently truncates or
          # 503s large package downloads.
          prepare: |
            for i in 1 2 3; do
              /usr/sbin/pkg_add -I bash git-base clang && break
              sleep 20
            done
            /usr/sbin/pkg_add -I python313 || /usr/sbin/pkg_add -I python312
            for v in 3.13 3.12; do
              if [ -x /usr/pkg/bin/python$v ]; then ln -sf /usr/pkg/bin/python$v /usr/pkg/bin/python3; break; fi
            done
            command -v clang || { echo "clang install failed"; exit 1; }
          run: |
            set -e
            # NetBSD's defaults cap the main-thread stack at 8 MiB (soft) and
            # the data segment at 4 GiB. The test runner recurses on the main
            # thread, and the DebugAllocator grows monotonically, so raise
            # both to the hard limits (64 MiB / 64 GiB) before running the
            # unit-test binary (docs/dev/netbsd.md).
            ulimit -s $(ulimit -H -s)
            ulimit -d $(ulimit -H -d)
            ./unit-tests-netbsd
            ./thottam-tests-netbsd
            cc -shared -fPIC tests/scheme/ffi/fixtures/u64test.c -o tests/scheme/ffi/fixtures/libu64test.so
            bash tests/scheme/run-all.sh

  # Cross-compile the Windows binaries and the unit-test binary from
  # Linux, once per arch. Compile-only by design: this guards the
  # cross-compilation path release.yml ships with, independent of the
  # Windows runner images. Execution is covered by windows-arm-test and
  # windows-x64-test below.
  windows-cross:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: windows-cross-${{ matrix.arch }}

      - name: Build (cross-compile for ${{ matrix.arch }}-windows)
        # `lib` builds kaappi_rt.lib — windows-x64-test links against it
        # in the native-backend e2e step.
        run: |
          zig build -Dtarget=${{ matrix.arch }}-windows
          zig build lib -Dtarget=${{ matrix.arch }}-windows

      - name: Compile unit tests (${{ matrix.arch }}-windows)
        # The host can't execute the foreign test binaries; the build's
        # Run steps set skip_foreign_checks, so this compiles everything
        # and skips execution — a plain compile gate with normal error
        # propagation.
        run: |
          zig build test -Dtarget=${{ matrix.arch }}-windows
          ls .zig-cache/o/*/unit-tests.exe

      - name: Stage binaries for the Windows test jobs
        # ls -t picks the exe this run compiled — the restored Zig cache
        # can hold stale unit-tests.exe from earlier runs.
        run: |
          mkdir -p win-stage
          cp zig-out/bin/kaappi.exe zig-out/bin/thottam.exe zig-out/bin/kaappi-lsp.exe win-stage/
          cp zig-out/lib/kaappi_rt.lib win-stage/
          cp "$(ls -t .zig-cache/o/*/unit-tests.exe | head -1)" win-stage/
          cp "$(ls -t .zig-cache/o/*/thottam-tests.exe | head -1)" win-stage/

      - name: Cross-compile FFI test fixture
        # uint64-range.scm dlopens this; the Windows test jobs drop it
        # into tests/scheme/ffi/fixtures/ — the arm job has no toolchain
        # (#1613).
        run: zig cc -target ${{ matrix.arch }}-windows-gnu -shared tests/scheme/ffi/fixtures/u64test.c -o win-stage/libu64test.dll

      - name: Upload binaries for the Windows test jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ matrix.arch }}-binaries
          path: win-stage/
          retention-days: 3

  # Execute the suite on real Windows ARM64 via GitHub's hosted
  # windows-11-arm runners (free for public repos): the unit suite, the
  # thottam suite + install/remove integration (#1609), the R7RS suite,
  # the .scm suites verified on the port's reference VM
  # (docs/dev/windows.md), including the FFI suite (#1611) against the
  # cross-compiled fixture DLL, and the shell-based suites (#1612) under
  # the runner's Git Bash. The binaries come cross-compiled from
  # windows-cross — Zig 0.16.0 cannot compile natively on Windows ARM64
  # (zig build/build-exe access-violate on any project, #1613) — so this
  # job installs no toolchain and only executes; the compile/ suite
  # (which rebuilds with zig on the box) self-skips for the same reason.
  windows-arm-test:
    needs: windows-cross
    runs-on: windows-11-arm
    timeout-minutes: 40
    steps:
      # The Windows runner images set core.autocrlf=true; the Scheme
      # suites compare exact output, so check out files as committed.
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-aarch64-binaries
          path: bin

      - name: Unwrap archived artifact
        # Safety net only: named downloads extract the artifact contents
        # into `path` directly (loose files, so this loop normally has
        # nothing to do — the wrapper-zip belief was a misdiagnosis, #1620).
        # Windows ships bsdtar, which extracts zip if one ever appears.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for z in bin/*.zip; do tar -xf "$z" -C bin && rm -f "$z"; done
          ls -l bin

      - name: Stage FFI test fixture
        # uint64-range.scm opens tests/scheme/ffi/fixtures/libu64test
        # relative to the repo root this job runs the suites from.
        shell: bash
        run: cp bin/libu64test.dll tests/scheme/ffi/fixtures/

      - name: Create tmp directories
        # Tests write scratch files under /tmp/..., which kaappi.exe
        # resolves to \tmp on the current drive (docs/dev/windows.md).
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null
          $drive = (Get-Location).Path.Substring(0, 2)
          New-Item -ItemType Directory -Force -Path "$drive\tmp" | Out-Null

      - name: Unit tests
        shell: bash
        run: bin/unit-tests.exe

      - name: thottam unit tests
        shell: bash
        run: bin/thottam-tests.exe

      - name: thottam integration test
        # Mirrors the POSIX test job's step: a real install of the
        # pure-Scheme kaappi-json (Git for Windows is preinstalled on the
        # runner), imported through the installed lib dir, then removed —
        # which deletes a real git clone, whose read-only pack files are
        # the Windows-specific removal hazard (#1609). KAAPPI_HOME is a
        # C:/-style path (pwd -W): thottam hands paths straight to git.exe
        # and the CRT, which never see git-bash's /d/... spellings.
        shell: bash
        run: |
          export KAAPPI_HOME="$(pwd -W)/thottam-home"
          bin/thottam.exe list
          bin/thottam.exe install kaappi-json
          bin/thottam.exe update kaappi-json
          bin/thottam.exe list | grep kaappi-json
          bin/thottam.exe verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' > use-json.scm
          bin/kaappi.exe --lib-path "$KAAPPI_HOME/lib" use-json.scm
          bin/thottam.exe remove kaappi-json
          ! bin/thottam.exe list | grep kaappi-json
          rm -f use-json.scm

      - name: R7RS test suite
        shell: bash
        run: bin/kaappi.exe tests/scheme/r7rs/r7rs-tests.scm

      - name: Scheme suites (VM-verified subset)
        shell: bash
        run: |
          fail=0
          for dir in smoke compliance continuations hygiene srfi ffi audit; do
            for f in tests/scheme/$dir/*.scm; do
              if bin/kaappi.exe "$f" > out.log 2>&1; then
                echo "  PASS  $f"
              else
                echo "  FAIL  $f"
                cat out.log
                fail=1
              fi
            done
          done
          rm -f out.log
          exit $fail

      - name: Shell suites (#1612)
        # The bash-driven drivers, under the runner's Git Bash. Exit 77 =
        # SKIP (tests/scheme/shell-common.sh): a script whose premise cannot
        # hold on Windows — the compile/ suite needs a native Zig toolchain
        # (#1613) — reports itself instead of failing. KAAPPI_HOME is
        # isolated like run-all.sh does, so suites never touch a real cache.
        shell: bash
        run: |
          # Some drivers validate JSON with python3; the arm image ships
          # Python as `python`, so shim python3 when the name is missing.
          # ($HOME, not $RUNNER_TEMP: a Windows-spelled dir in bash's PATH
          # would not resolve for bash's own lookup.)
          if ! command -v python3 >/dev/null 2>&1; then
            mkdir -p "$HOME/.pyshim"
            printf '#!/bin/sh\nexec python "$@"\n' > "$HOME/.pyshim/python3"
            chmod +x "$HOME/.pyshim/python3"
            export PATH="$HOME/.pyshim:$PATH"
          fi
          export KAAPPI=bin/kaappi.exe
          export KAAPPI_HOME="$RUNNER_TEMP/kaappi-test-home"
          fail=0
          for dir in smoke errors compile test-runner pipeline doctor fmt cache timings sandbox robustness; do
            for s in tests/scheme/$dir/*.sh; do
              [ -e "$s" ] || continue
              # `|| status=$?`: the runner's `shell: bash` implies -e, which
              # would otherwise abort the whole step on the first SKIP (77).
              status=0
              out=$(KAAPPI="$KAAPPI" bash "$s" "$KAAPPI" 2>&1) || status=$?
              if [ "$status" -eq 0 ]; then
                echo "  PASS  $s"
              elif [ "$status" -eq 77 ]; then
                echo "  SKIP  $s"
              else
                echo "  FAIL  $s (exit $status)"
                printf '%s\n' "$out"
                fail=1
              fi
            done
          done
          exit $fail

  # Execute the same suite set on x86_64 Windows via the standard
  # windows-latest runners, from the cross-compiled x86_64 artifacts
  # (guarding the binaries release.yml ships), plus the native-backend
  # e2e suite (tests/e2e/run-e2e.ps1, #1610) — possible only on this
  # arch: Zig 0.16.0 works natively on x86_64 Windows, while the
  # aarch64 toolchain access-violates compiling anything (#1613, an
  # aarch64-only LLVM COFF bug). Zig is installed only after the shell
  # suites so both Windows jobs run them under identical no-toolchain
  # conditions (the bundle-rebuild scripts gate on a toolchain being
  # present).
  windows-x64-test:
    needs: windows-cross
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      # The Windows runner images set core.autocrlf=true; the Scheme
      # suites compare exact output, so check out files as committed.
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-x86_64-binaries
          path: bin

      - name: Unwrap archived artifact
        # Safety net only: named downloads extract the artifact contents
        # into `path` directly (loose files, so this loop normally has
        # nothing to do — the wrapper-zip belief was a misdiagnosis, #1620).
        # Windows ships bsdtar, which extracts zip if one ever appears.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for z in bin/*.zip; do tar -xf "$z" -C bin && rm -f "$z"; done
          ls -l bin

      - name: Stage FFI test fixture
        # uint64-range.scm opens tests/scheme/ffi/fixtures/libu64test
        # relative to the repo root this job runs the suites from.
        shell: bash
        run: cp bin/libu64test.dll tests/scheme/ffi/fixtures/

      - name: Create tmp directories
        # Tests write scratch files under /tmp/..., which kaappi.exe
        # resolves to \tmp on the current drive (docs/dev/windows.md).
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null
          $drive = (Get-Location).Path.Substring(0, 2)
          New-Item -ItemType Directory -Force -Path "$drive\tmp" | Out-Null

      - name: Unit tests
        shell: bash
        run: bin/unit-tests.exe

      - name: thottam unit tests
        shell: bash
        run: bin/thottam-tests.exe

      - name: thottam integration test
        # Mirrors the POSIX test job's step: a real install of the
        # pure-Scheme kaappi-json, imported through the installed lib
        # dir, then removed — which deletes a real git clone, whose
        # read-only pack files are the Windows-specific removal hazard
        # (#1609). KAAPPI_HOME is a C:/-style path (pwd -W): thottam
        # hands paths straight to git.exe and the CRT, which never see
        # git-bash's /d/... spellings.
        shell: bash
        run: |
          export KAAPPI_HOME="$(pwd -W)/thottam-home"
          bin/thottam.exe list
          bin/thottam.exe install kaappi-json
          bin/thottam.exe update kaappi-json
          bin/thottam.exe list | grep kaappi-json
          bin/thottam.exe verify
          echo '(import (kaappi json)) (display (json-write-string (list 1 2 3))) (newline)' > use-json.scm
          bin/kaappi.exe --lib-path "$KAAPPI_HOME/lib" use-json.scm
          bin/thottam.exe remove kaappi-json
          ! bin/thottam.exe list | grep kaappi-json
          rm -f use-json.scm

      - name: R7RS test suite
        shell: bash
        run: bin/kaappi.exe tests/scheme/r7rs/r7rs-tests.scm

      - name: Scheme suites (VM-verified subset)
        shell: bash
        run: |
          fail=0
          for dir in smoke compliance continuations hygiene srfi ffi audit; do
            for f in tests/scheme/$dir/*.scm; do
              if bin/kaappi.exe "$f" > out.log 2>&1; then
                echo "  PASS  $f"
              else
                echo "  FAIL  $f"
                cat out.log
                fail=1
              fi
            done
          done
          rm -f out.log
          exit $fail

      - name: Shell suites (#1612)
        # The bash-driven drivers, under the runner's Git Bash. Exit 77 =
        # SKIP (tests/scheme/shell-common.sh): a script whose premise cannot
        # hold on Windows — the compile/ suite hard-skips on the OS — reports
        # itself instead of failing. KAAPPI_HOME is isolated like run-all.sh
        # does, so suites never touch a real cache.
        shell: bash
        run: |
          # Some drivers validate JSON with python3; shim python3 when the
          # name is missing. ($HOME, not $RUNNER_TEMP: a Windows-spelled dir
          # in bash's PATH would not resolve for bash's own lookup.)
          if ! command -v python3 >/dev/null 2>&1; then
            mkdir -p "$HOME/.pyshim"
            printf '#!/bin/sh\nexec python "$@"\n' > "$HOME/.pyshim/python3"
            chmod +x "$HOME/.pyshim/python3"
            export PATH="$HOME/.pyshim:$PATH"
          fi
          export KAAPPI=bin/kaappi.exe
          export KAAPPI_HOME="$RUNNER_TEMP/kaappi-test-home"
          fail=0
          for dir in smoke errors compile test-runner pipeline doctor fmt cache timings sandbox robustness; do
            for s in tests/scheme/$dir/*.sh; do
              [ -e "$s" ] || continue
              # `|| status=$?`: the runner's `shell: bash` implies -e, which
              # would otherwise abort the whole step on the first SKIP (77).
              status=0
              out=$(KAAPPI="$KAAPPI" bash "$s" "$KAAPPI" 2>&1) || status=$?
              if [ "$status" -eq 0 ]; then
                echo "  PASS  $s"
              elif [ "$status" -eq 77 ]; then
                echo "  SKIP  $s"
              else
                echo "  FAIL  $s (exit $status)"
                printf '%s\n' "$out"
                fail=1
              fi
            done
          done
          exit $fail

      - name: Install Zig
        # After the suites (see the job comment). Native x86_64 Windows
        # Zig — the C compiler + linker `kaappi compile` picks up.
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: windows-x64-test

      - name: Native backend e2e (#1610)
        # `kaappi compile` end-to-end on x86_64 Windows: emits LLVM IR,
        # links against the cross-compiled kaappi_rt.lib (KAAPPI_LIB_DIR
        # — the artifact drops it next to the exe, not at the
        # exe-relative ..\lib), and requires every native binary's
        # output to match the interpreter's.
        shell: pwsh
        run: |
          $env:KAAPPI_LIB_DIR = Join-Path $PWD "bin"
          & .\tests\e2e\run-e2e.ps1 -Kaappi (Join-Path $PWD "bin\kaappi.exe")
          exit $LASTEXITCODE

  wasm:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: wasm

      - name: Build WASM
        run: zig build wasm

      - name: Install wasmtime
        run: |
          WASMTIME_VERSION=v46.0.1
          curl -sSfL "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" | tar xJ
          echo "$(pwd)/wasmtime-${WASMTIME_VERSION}-x86_64-linux" >> "$GITHUB_PATH"

      - name: Smoke test
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/smoke.scm

      - name: Timer test (reactor poll_oneoff backend)
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/timers.scm

      - name: Parallel pool test (fiber-degraded, KEP-0002 Phase 5)
        run: wasmtime run --dir=. zig-out/bin/kaappi.wasm tests/wasm/parallel.scm

  coverage:
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Install kcov
        run: sudo apt-get update && sudo apt-get install -y kcov

      - name: Unit test coverage
        run: zig build coverage
        continue-on-error: true

      - name: R7RS suite coverage
        run: zig build coverage-scheme -- tests/scheme/r7rs/r7rs-tests.scm
        continue-on-error: true

      - name: Extended coverage (disassembler, etc.)
        run: |
          for f in tests/scheme/coverage/*-coverage.scm; do
            zig build coverage-scheme -- "$f" || true
          done
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 90

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          directory: coverage/
          fail_ci_if_error: false

  benchmark:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      # github-action-benchmark's auto-push authenticates via its
      # github-token input (token-in-URL remote), not persisted
      # checkout credentials, so these can stay disabled.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Run benchmarks
        run: bash benchmarks/run-benchmarks.sh --json > benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: 'dev/bench'
          max-items-in-chart: 100
