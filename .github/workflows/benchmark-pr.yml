name: PR Benchmark Comparison

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'lib/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/benchmark-pr.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # fetch-depth: 0 brings all refs during checkout, so the later
      # base/head `git checkout <sha>` steps are purely local and need
      # no git credentials.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Build and benchmark PR branch
        run: |
          zig build
          bash benchmarks/run-benchmarks.sh --json > pr-results.json

      - name: Build and benchmark base branch
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          zig build
          bash benchmarks/run-benchmarks.sh --json > base-results.json
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Compare and comment
        uses: kaappi/github-action-pull-request-benchmark@11e6f9c49191a57127f53dddcbdcc30b18f7f0a3 # v1.4.0
        with:
          tool: 'raw'
          pr-benchmark-file-path: pr-results.json
          base-benchmark-file-path: base-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '120%'
          comment-always: true
