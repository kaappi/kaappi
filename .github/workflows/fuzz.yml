name: Fuzz

# Scheduled bounded fuzzing of the targets in src/tests_fuzz.zig, plus the
# offline VM-vs-native differential batch (tests/fuzz/native-diff.sh).
# See docs/dev/fuzzing.md for the runbook (running locally, and turning a
# failure into a regression test + corpus entry).

on:
  schedule:
    # Daily at 02:47 UTC — away from the 05:17 UTC ecosystem nightly.
    - cron: '47 2 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Fuzz run limit per variant (number, K/M/G suffix allowed). Overrides the matrix defaults.'
        required: false
        default: ''
      native-diff-count:
        description: 'Number of programs for the VM-vs-native differential batch.'
        required: false
        default: ''
      native-diff-base:
        description: 'First seed for the differential batch (default: rotates per run).'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        include:
          # The limit applies PER FUZZ TEST (7 targets currently). The eval,
          # token, and grammar targets build a full VM per input (~20-50 ms)
          # — and the differential target two of them — so they dominate the
          # wall time: locally 200 per target is a ~2 minute pass, so 2K per
          # target keeps a hosted runner well under the job timeout.
          - variant: default
            build-args: ''
            limit: 2K
          # The planned gc-stress variant (collection attempted on every
          # allocation, converting latent rooting bugs into immediate
          # failures) is DISABLED: ~440 of 690 unit tests currently crash
          # under -Dgc-stress=true, so the pre-fuzz test phase can never
          # pass. Re-enable when https://github.com/kaappi/kaappi/issues/1401
          # is fixed.
          # - variant: gc-stress
          #   build-args: '-Dgc-stress=true'
          #   limit: 200
    steps:
      # Both jobs in this workflow execute fuzzer-generated programs (and
      # the native-diff job runs binaries compiled from them), so don't
      # leave the GITHUB_TOKEN sitting in git config for the process tree.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: fuzz-${{ matrix.variant }}

      # Fuzzer state accumulates across runs when the cache is preserved:
      # f/ holds the discovered corpus, v/ the coverage bitmap. The rolling
      # key restores the newest previous corpus and saves an updated one
      # (only on success, so crash state is never cached — the crash marker
      # is uploaded as an artifact instead).
      - name: Restore fuzz corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .zig-cache/f
            .zig-cache/v
          key: fuzz-corpus-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.variant }}-

      # Zig 0.16's bounded fuzz mode does NOT propagate a fuzz-found crash
      # into the build's exit code — it saves the encoded crashing input to
      # .zig-cache/f/crash and reports the step failed, but `zig build` still
      # exits 0. The crash marker file is authoritative. Inputs are passed
      # via env so user-controlled dispatch values never reach Bash source.
      - name: Fuzz (bounded)
        shell: bash
        env:
          FUZZ_LIMIT: ${{ inputs.limit || matrix.limit }}
          BUILD_ARGS: ${{ matrix.build-args }}
        run: |
          set -o pipefail
          rm -f .zig-cache/f/crash
          zig build test "--fuzz=$FUZZ_LIMIT" $BUILD_ARGS 2>&1 | tee fuzz-run.log
          if [ -f .zig-cache/f/crash ]; then
            echo "::error::Fuzzing found a crash; encoded input saved to .zig-cache/f/crash"
            exit 1
          fi

      # f/crash holds the crashing input as a serialized Smith decision
      # stream (see docs/dev/fuzzing.md for turning it into a regression
      # test); libfuzzer.log has the fuzzer's own transcript.
      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.variant }}
          path: |
            .zig-cache/f/crash
            fuzz-run.log
            .zig-cache/tmp/libfuzzer.log
          retention-days: 90
          if-no-files-found: warn

  # Offline differential batch: bytecode VM vs LLVM native backend (#1395).
  # Each input is generate + interpret + compile-and-link + run, so this is a
  # scheduled batch (~1s per program), not a std.testing.fuzz target. The
  # seed base rotates per run so nightly batches cover fresh programs while
  # staying reproducible: the base is printed in the log, the divergent
  # programs themselves are uploaded, and any base can be replayed via
  # workflow_dispatch or locally with
  # `bash tests/fuzz/native-diff.sh <count> <base>`.
  native-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0
          cache-key: fuzz-native-diff

      - name: Build interpreter, runtime library, and generator
        run: |
          zig build
          zig build lib
          zig build fuzz-gen

      - name: Differential batch (VM vs native backend)
        env:
          COUNT: ${{ inputs.native-diff-count }}
          BASE: ${{ inputs.native-diff-base }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          count="${COUNT:-300}"
          base="${BASE:-$((RUN_NUMBER * 300))}"
          bash tests/fuzz/native-diff.sh "$count" "$base"

      # Each divergence comes with the program and both sides' stdout/stderr;
      # see docs/dev/fuzzing.md for minimising it into a regression test.
      - name: Upload divergences
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-diff-divergences
          path: native-diff-results/
          retention-days: 90
          if-no-files-found: warn
