name: Post-Release Acceptance Tests

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g. v0.6.3)'
        required: true

# Read-only: gh release download needs contents: read; nothing here
# writes to the repository.
permissions:
  contents: read

jobs:
  test-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        run: gh release download "${{ steps.tag.outputs.tag }}" --repo "${{ github.repository }}" --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify SHA256 checksums
        run: cd release && sha256sum -c SHA256SUMS

      - name: Verify GPG signature (best-effort)
        continue-on-error: true
        run: |
          if [ -z "${{ vars.GPG_KEY_ID }}" ]; then
            echo "GPG_KEY_ID not configured, skipping signature verification"
            exit 0
          fi
          gpg --keyserver keyserver.ubuntu.com --recv-keys "${{ vars.GPG_KEY_ID }}"
          cd release
          gpg --verify SHA256SUMS.asc SHA256SUMS

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'kaappi-aarch64-macos' \
            --pattern 'thottam-aarch64-macos' \
            --pattern 'kaappi-lib.tar.gz' \
            --pattern 'SHA256SUMS' \
            --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify checksum
        run: cd release && grep 'kaappi-aarch64-macos' SHA256SUMS | shasum -a 256 -c

      - name: Install binary and libraries
        run: |
          chmod +x release/kaappi-aarch64-macos release/thottam-aarch64-macos
          mkdir -p "$HOME/.kaappi/lib"
          tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract --strip-components=0 || \
            (mkdir -p /tmp/libextract && tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract)
          cp -r /tmp/libextract/lib/* "$HOME/.kaappi/lib/" 2>/dev/null || true

      - name: Run acceptance tests
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          KAAPPI=release/kaappi-aarch64-macos \
          THOTTAM=release/thottam-aarch64-macos \
          bash tests/acceptance/acceptance.sh "${TAG#v}"

  test-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'kaappi-x86_64-linux' \
            --pattern 'thottam-x86_64-linux' \
            --pattern 'kaappi-lib.tar.gz' \
            --pattern 'SHA256SUMS' \
            --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify checksum
        run: cd release && grep 'kaappi-x86_64-linux' SHA256SUMS | sha256sum -c

      - name: Install binary and libraries
        run: |
          chmod +x release/kaappi-x86_64-linux release/thottam-x86_64-linux
          mkdir -p "$HOME/.kaappi/lib"
          tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract --strip-components=0 || \
            (mkdir -p /tmp/libextract && tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract)
          cp -r /tmp/libextract/lib/* "$HOME/.kaappi/lib/" 2>/dev/null || true

      - name: Run acceptance tests
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          KAAPPI=release/kaappi-x86_64-linux \
          THOTTAM=release/thottam-x86_64-linux \
          bash tests/acceptance/acceptance.sh "${TAG#v}"

  test-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'kaappi-aarch64-linux' \
            --pattern 'thottam-aarch64-linux' \
            --pattern 'kaappi-lib.tar.gz' \
            --pattern 'SHA256SUMS' \
            --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify checksum
        run: cd release && grep 'kaappi-aarch64-linux' SHA256SUMS | sha256sum -c

      - name: Install binary and libraries
        run: |
          chmod +x release/kaappi-aarch64-linux release/thottam-aarch64-linux
          mkdir -p "$HOME/.kaappi/lib"
          tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract --strip-components=0 || \
            (mkdir -p /tmp/libextract && tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract)
          cp -r /tmp/libextract/lib/* "$HOME/.kaappi/lib/" 2>/dev/null || true

      - name: Run acceptance tests
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          KAAPPI=release/kaappi-aarch64-linux \
          THOTTAM=release/thottam-aarch64-linux \
          bash tests/acceptance/acceptance.sh "${TAG#v}"

  # x86_64 Windows acceptance on the standard windows-latest runners,
  # under the runner's Git Bash (acceptance.sh is plain bash driving the
  # binary; verified 34/34 against the cross-compiled x86_64 binaries on
  # the Windows reference VM). The aarch64-windows artifact has no such
  # leg — smoke-test it on the reference VM per the release skill.
  test-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        shell: bash
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'kaappi-x86_64-windows.exe' \
            --pattern 'thottam-x86_64-windows.exe' \
            --pattern 'kaappi-lib.tar.gz' \
            --pattern 'SHA256SUMS' \
            --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify checksum
        shell: bash
        run: cd release && grep 'kaappi-x86_64-windows.exe' SHA256SUMS | sha256sum -c

      - name: Install libraries
        shell: bash
        run: |
          mkdir -p "$HOME/.kaappi/lib" /tmp/libextract
          tar xzf release/kaappi-lib.tar.gz -C /tmp/libextract
          cp -r /tmp/libextract/lib/* "$HOME/.kaappi/lib/"

      - name: Run acceptance tests
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          KAAPPI=release/kaappi-x86_64-windows.exe \
          THOTTAM=release/thottam-x86_64-windows.exe \
          bash tests/acceptance/acceptance.sh "${TAG#v}"

  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download WASM binary
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'kaappi.wasm' \
            --dir release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install wasmtime
        run: curl https://wasmtime.dev/install.sh -sSf | bash && echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Run WASM acceptance tests
        run: KAAPPI_WASM=release/kaappi.wasm bash tests/acceptance/test-wasm.sh

  test-install-script:
    # The installer's platform detection is where per-OS bugs have historically
    # lived, so exercise it on every OS/arch pair GitHub hosts. riscv64, s390x
    # and ppc64le are absent because no runner executes them natively — and
    # they are interpreter-tier, so the archive assertions below would not
    # apply there anyway.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run install script
        run: |
          export INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          curl -fsSL https://kaappi-lang.org/install.sh | bash

      - name: Verify installation
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          TAG="${{ steps.tag.outputs.tag }}"
          kaappi --version | grep -F "${TAG#v}"
          thottam --version | grep -F "${TAG#v}"
          echo '(display (+ 1 2))' | kaappi | grep -F '3'

      # `kaappi compile` needs an LLVM-capable driver, and this runner's `cc`
      # is GCC — which cannot consume the IR the backend emits, and is picked
      # ahead of the preinstalled clang by cc_search_order (zig, cc, clang,
      # gcc). Installing zig puts a usable driver first in that order.
      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Verify the native backend is installed and usable
        # The installer must place libkaappi_rt.a where `kaappi compile` looks
        # for it (<exe>/../lib). The script shipped no archive at all until
        # 0.22.0, so a regression here silently costs every user the native
        # backend — assert the whole chain, not just that the file exists.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          test -f "$HOME/.local/lib/libkaappi_rt.a"
          kaappi doctor | grep -F 'PASS  libkaappi_rt.a: found in'
          kaappi doctor | grep -F 'PASS  smoke-link:'
          echo '(display (* 6 7))' > /tmp/native-check.scm
          kaappi compile /tmp/native-check.scm -o /tmp/native-check
          /tmp/native-check | grep -F '42'

  summary:
    needs: [test-checksums, test-macos, test-linux-x86, test-linux-arm, test-windows-x64, test-wasm, test-install-script]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        # Every leg must be exactly `success` — a cancelled or skipped
        # job is not an acceptance pass.
        run: |
          results="${{ needs.test-checksums.result }} ${{ needs.test-macos.result }} ${{ needs.test-linux-x86.result }} ${{ needs.test-linux-arm.result }} ${{ needs.test-windows-x64.result }} ${{ needs.test-wasm.result }} ${{ needs.test-install-script.result }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "One or more acceptance tests did not succeed"
              exit 1
            fi
          done
          echo "All acceptance tests passed"
