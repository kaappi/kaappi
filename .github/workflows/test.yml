name: Test

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Scheme suites
        run: bash tests/scheme/run-all.sh
