name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            artifact: kaappi-aarch64-macos
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: kaappi-x86_64-linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux
            artifact: kaappi-aarch64-linux
          - os: ubuntu-latest
            target: riscv64-linux
            artifact: kaappi-riscv64-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: xyzzylabs/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build release binaries
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Sign and notarize macOS binaries
        if: matrix.target == 'aarch64-macos'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Import certificate into temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign with Developer ID and hardened runtime
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime zig-out/bin/kaappi
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime zig-out/bin/thottam

          # Notarize both binaries
          zip notarize.zip zig-out/bin/kaappi zig-out/bin/thottam
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --wait

          # Cleanup
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Rename binaries
        run: |
          cp zig-out/bin/kaappi ${{ matrix.artifact }}
          cp zig-out/bin/thottam thottam-${{ matrix.target }}

      - name: Upload kaappi artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload thottam artifact
        uses: actions/upload-artifact@v4
        with:
          name: thottam-${{ matrix.target }}
          path: thottam-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Collect binaries, generate checksums, and sign
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'kaappi-*' -o -name 'thottam-*' \) -exec cp {} release/ \;
          cd release
          sha256sum kaappi-* thottam-* > SHA256SUMS
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign --armor SHA256SUMS

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(sed -n "/^## \[${TAG#v}\]/,/^## \[/p" CHANGELOG.md | sed '$d' || echo "Release $TAG")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: release/*
