name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            artifact: kaappi-aarch64-macos
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: kaappi-x86_64-linux
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          - os: ubuntu-24.04-arm
            target: aarch64-linux
            artifact: kaappi-aarch64-linux
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          - os: ubuntu-latest
            target: riscv64-linux
            artifact: kaappi-riscv64-linux
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          # Cross-compiled from Linux (Zig bundles FreeBSD 14+ libc).
          # Execution is verified by CI's freebsd-test VM job (x86_64)
          # and on the port's aarch64 reference machine
          # (docs/dev/freebsd.md).
          - os: ubuntu-latest
            target: x86_64-freebsd
            artifact: kaappi-x86_64-freebsd
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          - os: ubuntu-latest
            target: aarch64-freebsd
            artifact: kaappi-aarch64-freebsd
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          # Cross-compiled from Linux. `zig build` marks each binary
          # PT_OPENBSD_NOBTCFI via the host patcher (build.zig) so it survives
          # OpenBSD's BTCFI enforcement; the marker is a program header that
          # stripping preserves. Execution is verified by CI's openbsd-test VM
          # job (x86_64) and on the aarch64 reference machine
          # (docs/dev/openbsd.md).
          - os: ubuntu-latest
            target: x86_64-openbsd
            artifact: kaappi-x86_64-openbsd
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          - os: ubuntu-latest
            target: aarch64-openbsd
            artifact: kaappi-aarch64-openbsd
            exe_ext: ''
            lib_src: libkaappi_rt.a
            lib_ext: .a
            strip: true
          # Cross-compiled via Zig's bundled mingw-w64; execution is
          # verified on real Windows 11 ARM64 hardware (docs/dev/windows.md)
          # since GitHub has no ARM64 Windows runners. The gnu-ABI static
          # lib is emitted as kaappi_rt.lib on this target. strip: false —
          # under strip, Zig 0.16.0's LLVM miscompiles threadlocal access
          # on aarch64-windows (#1607, upstream ziglang#31865), so a
          # stripped kaappi.exe access-violates at startup; re-enable at
          # the toolchain bump (#1613). thottam is unaffected but ships
          # unstripped for consistency.
          - os: ubuntu-latest
            target: aarch64-windows
            artifact: kaappi-aarch64-windows.exe
            exe_ext: .exe
            lib_src: kaappi_rt.lib
            lib_ext: .lib
            strip: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Build release binaries and runtime library
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=${{ matrix.strip }}
          zig build lib -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Sign and notarize macOS binaries
        if: matrix.target == 'aarch64-macos'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Import certificate into temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign with Developer ID and hardened runtime
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --entitlements .github/kaappi.entitlements zig-out/bin/kaappi
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --entitlements .github/kaappi.entitlements zig-out/bin/thottam

          # Notarize both binaries
          zip notarize.zip zig-out/bin/kaappi zig-out/bin/thottam
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --wait

          # Cleanup
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Rename binaries
        run: |
          cp zig-out/bin/kaappi${{ matrix.exe_ext }} ${{ matrix.artifact }}
          cp zig-out/bin/thottam${{ matrix.exe_ext }} thottam-${{ matrix.target }}${{ matrix.exe_ext }}
          cp zig-out/lib/${{ matrix.lib_src }} libkaappi_rt-${{ matrix.target }}${{ matrix.lib_ext }}

      - name: Upload kaappi artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

      - name: Upload thottam artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: thottam-${{ matrix.target }}${{ matrix.exe_ext }}
          path: thottam-${{ matrix.target }}${{ matrix.exe_ext }}
          retention-days: 1

      - name: Upload libkaappi_rt artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: libkaappi_rt-${{ matrix.target }}
          path: libkaappi_rt-${{ matrix.target }}${{ matrix.lib_ext }}
          retention-days: 1

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zig
        uses: xyzzylabs/setup-zig@09d85d9dbb73308882e7a26e61a8f706eed40df1 # v1.0.2
        with:
          version: 0.16.0

      - name: Build WASM
        run: zig build wasm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kaappi-wasm32-wasi
          path: zig-out/bin/kaappi.wasm
          retention-days: 1

  release:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > "$RUNNER_TEMP/gpg-key.asc"
          chmod 600 "$RUNNER_TEMP/gpg-key.asc"
          gpg --batch --import "$RUNNER_TEMP/gpg-key.asc"
          rm "$RUNNER_TEMP/gpg-key.asc"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Bundle portable libraries
        run: tar czf kaappi-lib.tar.gz lib/srfi/ lib/chibi/ LICENSE

      - name: Collect binaries, generate checksums, and sign
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'kaappi-*' -o -name 'kaappi.wasm' -o -name 'thottam-*' -o -name 'libkaappi_rt-*' \) -exec cp {} release/ \;
          cp kaappi-lib.tar.gz release/
          cd release
          sha256sum kaappi-* kaappi.wasm thottam-* libkaappi_rt-* kaappi-lib.tar.gz > SHA256SUMS
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign --armor SHA256SUMS

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(sed -n "/^## \[${TAG#v}\]/,/^## \[/p" CHANGELOG.md | sed '$d' || echo "Release $TAG")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # action-gh-release talks to the API with the workflow token
      # (contents: write above); it performs no git operations, so
      # disabled checkout credentials don't affect it.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: release/*
