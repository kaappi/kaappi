site_name: Kaappi
site_url: https://kaappi.github.io/kaappi/
site_description: A complete R7RS-small Scheme implementation written in Zig
repo_url: https://github.com/kaappi/kaappi
repo_name: kaappi/kaappi

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Guide:
    - guide/index.md
    - Installation: guide/installation.md
    - Your First Program: guide/first-program.md
    - Language Reference: guide/language.md
    - Libraries: guide/libraries.md
    - Advanced Features: guide/advanced.md
    - CLI Reference: guide/cli.md
    - Tips: guide/tips.md
  - Procedures: procedures.md
  - Libraries: libraries.md
  - Benchmarks: benchmarks.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - admonition
  - toc:
      permalink: true
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kaappi/kaappi

copyright: MIT License &mdash; Built with Zig

exclude_docs: |
  dev/
  ideas.md
  errata-corrected-r7rs.pdf
